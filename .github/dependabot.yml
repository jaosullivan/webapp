version: 2
updates:
  # GitHub Actions — keep CI action versions current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Users service Python dependencies
  - package-ecosystem: pip
    directory: /fullstack/services/users
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Orders service Python dependencies
  - package-ecosystem: pip
    directory: /fullstack/services/orders
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Payments service Python dependencies
  - package-ecosystem: pip
    directory: /fullstack/services/payments
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # NOTE: no `docker` ecosystem entries here. Dependabot can read `Containerfile`
  # (it correctly detects available base-image updates) but cannot write to it —
  # PR creation fails server-side with `dependency_file_not_supported` every time
  # an update is actually found, which shows up as a recurring failed run rather
  # than a harmless no-op. This repo intentionally uses Podman + Containerfile
  # (not Dockerfile), so base images aren't tracked by Dependabot; Trivy in CI
  # (`scan` job) is the active vulnerability gate for these images instead.

  # Frontend npm dependencies
  - package-ecosystem: npm
    directory: /fullstack/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Bundle minor/patch React ecosystem updates together
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
          - "vite*"
          - "@vitejs/*"
      tailwind:
        patterns:
          - "tailwindcss*"
          - "@tailwindcss/*"
