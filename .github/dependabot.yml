version: 2
updates:
  # GitHub Actions — keep CI action versions current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Users service Python dependencies
  - package-ecosystem: pip
    directory: /fullstack/services/users
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Orders service Python dependencies
  - package-ecosystem: pip
    directory: /fullstack/services/orders
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Payments service Python dependencies
  - package-ecosystem: pip
    directory: /fullstack/services/payments
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Container base images — NOTE: Dependabot's docker ecosystem only recognizes
  # files named `Dockerfile`, not `Containerfile` (open issue: dependabot-core#6067).
  # This repo intentionally uses Podman + Containerfile, so these entries are
  # currently no-ops; kept here so they activate automatically if/when support
  # lands. Trivy in CI (`scan` job) is the active vulnerability gate until then.
  - package-ecosystem: docker
    directory: /fullstack/services/users
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /fullstack/services/orders
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /fullstack/services/payments
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /fullstack/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Frontend npm dependencies
  - package-ecosystem: npm
    directory: /fullstack/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Bundle minor/patch React ecosystem updates together
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
          - "vite*"
          - "@vitejs/*"
      tailwind:
        patterns:
          - "tailwindcss*"
          - "@tailwindcss/*"
