name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/jaosullivan/webapp

jobs:
  # ------------------------------------------------------------------
  # Run the full pytest suite for each backend service.
  # Each matrix leg gets its own isolated PostgreSQL test database.
  # ------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        service: [users, orders, payments]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Create test database
        run: psql -h localhost -U postgres -c "CREATE DATABASE ${{ matrix.service }}_test;"
        env:
          PGPASSWORD: postgres

      - name: Install ${{ matrix.service }}
        run: pip install -e ".[dev]"
        working-directory: fullstack/services/${{ matrix.service }}

      - name: Test ${{ matrix.service }}
        run: pytest tests/ -v --tb=short
        working-directory: fullstack/services/${{ matrix.service }}
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/${{ matrix.service }}_test

  # ------------------------------------------------------------------
  # Build each container image with Podman and push to ghcr.io.
  # Runs only on pushes to main, after all tests pass.
  # ------------------------------------------------------------------
  build-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: users
            context: fullstack/services/users
          - service: orders
            context: fullstack/services/orders
          - service: payments
            context: fullstack/services/payments
          - service: frontend
            context: fullstack/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        run: |
          podman build \
            -t ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest \
            -f ${{ matrix.context }}/Containerfile \
            ${{ matrix.context }}
          podman push ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          podman push ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

  # ------------------------------------------------------------------
  # Update the Kustomize production overlay with the new image tags.
  # ArgoCD detects the Git change and syncs the cluster automatically.
  # ------------------------------------------------------------------
  update-manifests:
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        run: |
          curl -sLO "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz"
          tar xzf kustomize_v5.4.3_linux_amd64.tar.gz
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags in production overlay
        working-directory: fullstack/infra/k8s/overlays/production
        run: |
          for svc in users orders payments frontend; do
            kustomize edit set image \
              ${{ env.IMAGE_PREFIX }}/${svc}=${{ env.IMAGE_PREFIX }}/${svc}:${{ github.sha }}
          done

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fullstack/infra/k8s/overlays/production/kustomization.yaml
          git diff --staged --quiet || \
            git commit -m "ci: update image tags to ${GITHUB_SHA::8} [skip ci]"
          git push
