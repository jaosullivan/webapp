name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/jaosullivan/webapp

jobs:
  # ------------------------------------------------------------------
  # Run the full pytest suite for each backend service.
  # Each matrix leg gets its own isolated PostgreSQL test database.
  # ------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        service: [users, orders, payments]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Create test database
        run: psql -h localhost -U postgres -c "CREATE DATABASE ${{ matrix.service }}_test;"
        env:
          PGPASSWORD: postgres

      - name: Install ${{ matrix.service }}
        run: pip install -e ".[dev]"
        working-directory: fullstack/services/${{ matrix.service }}

      - name: Test ${{ matrix.service }}
        run: pytest tests/ -v --tb=short
        working-directory: fullstack/services/${{ matrix.service }}
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/${{ matrix.service }}_test
          REDIS_URL: redis://localhost:6379
          PYTHONPATH: ${{ github.workspace }}/fullstack/services

  # ------------------------------------------------------------------
  # Run the Vitest frontend test suite.
  # Runs in parallel with backend tests.
  # ------------------------------------------------------------------
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "26.4"
          cache: npm
          cache-dependency-path: fullstack/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: fullstack/frontend

      - name: Run Vitest
        run: npm test
        working-directory: fullstack/frontend

  # ------------------------------------------------------------------
  # Run Playwright E2E tests against the full stack with real backends.
  # ------------------------------------------------------------------
  test-e2e:
    runs-on: ubuntu-latest
    needs: [test, test-frontend]
    if: github.event_name == 'push'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "26.4"
          cache: npm
          cache-dependency-path: fullstack/frontend/package-lock.json

      - name: Create service databases
        run: |
          for db in users orders payments; do
            psql -h localhost -U postgres -c "CREATE DATABASE $db;"
          done
        env:
          PGPASSWORD: postgres

      - name: Install backend services
        run: |
          pip install -e "fullstack/services/users[dev]"
          pip install -e "fullstack/services/orders[dev]"
          pip install -e "fullstack/services/payments[dev]"

      - name: Start backend services
        run: |
          SVCDIR=$GITHUB_WORKSPACE/fullstack/services
          cd $SVCDIR/users && \
            DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/users \
            SECRET_KEY=ci-e2e-secret-key \
            REDIS_URL=redis://localhost:6379 \
            INITIAL_ADMIN_EMAIL=admin@example.com \
            PYTHONPATH=$SVCDIR \
            uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          cd $SVCDIR/orders && \
            DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/orders \
            SECRET_KEY=ci-e2e-secret-key \
            REDIS_URL=redis://localhost:6379 \
            PYTHONPATH=$SVCDIR \
            uvicorn app.main:app --host 0.0.0.0 --port 8002 &
          cd $SVCDIR/payments && \
            DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/payments \
            SECRET_KEY=ci-e2e-secret-key \
            REDIS_URL=redis://localhost:6379 \
            PYTHONPATH=$SVCDIR \
            uvicorn app.main:app --host 0.0.0.0 --port 8003 &

      - name: Wait for backend health checks
        run: |
          for port in 8001 8002 8003; do
            until curl -sf http://localhost:$port/health > /dev/null; do sleep 1; done
            echo "Service on :$port is ready"
          done

      - name: Seed demo data
        run: python fullstack/seed.py
        env:
          PYTHONPATH: ${{ github.workspace }}/fullstack/services

      - name: Install frontend dependencies
        run: npm ci
        working-directory: fullstack/frontend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: fullstack/frontend

      - name: Run Playwright tests
        run: npm run test:e2e
        working-directory: fullstack/frontend
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: fullstack/frontend/playwright-report/
          retention-days: 7

  # ------------------------------------------------------------------
  # Build each container image with Podman and push to ghcr.io.
  # Runs only on pushes to main, after all tests pass.
  # ------------------------------------------------------------------
  build-push:
    runs-on: ubuntu-latest
    needs: [test, test-frontend]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: users
            context: fullstack/services
            containerfile: fullstack/services/users/Containerfile
          - service: orders
            context: fullstack/services
            containerfile: fullstack/services/orders/Containerfile
          - service: payments
            context: fullstack/services
            containerfile: fullstack/services/payments/Containerfile
          - service: frontend
            context: fullstack/frontend
            containerfile: fullstack/frontend/Containerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        run: |
          docker build \
            -t ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest \
            -f ${{ matrix.containerfile }} \
            ${{ matrix.context }}
          docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

  # ------------------------------------------------------------------
  # Scan each pushed image for CRITICAL CVEs with Trivy.
  # Runs in parallel across services after build-push.
  # ------------------------------------------------------------------
  scan:
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        service: [users, orders, payments, frontend]
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan ${{ matrix.service }} for CRITICAL CVEs
        run: |
          trivy image \
            --severity CRITICAL \
            --exit-code 1 \
            --no-progress \
            --ignore-unfixed \
            "${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}"

  # ------------------------------------------------------------------
  # Update the Kustomize production overlay with the new image tags.
  # ArgoCD detects the Git change and syncs the cluster automatically.
  # ------------------------------------------------------------------
  update-manifests:
    runs-on: ubuntu-latest
    needs: [build-push, scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        run: |
          curl -sLO "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz"
          tar xzf kustomize_v5.4.3_linux_amd64.tar.gz
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags in production overlay
        working-directory: fullstack/infra/k8s/overlays/production
        run: |
          for svc in users orders payments frontend; do
            kustomize edit set image \
              ${{ env.IMAGE_PREFIX }}/${svc}=${{ env.IMAGE_PREFIX }}/${svc}:${{ github.sha }}
          done

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fullstack/infra/k8s/overlays/production/kustomization.yaml
          git diff --staged --quiet || \
            git commit -m "ci: update image tags to ${GITHUB_SHA::8} [skip ci]"
          git push
