server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Vite appends content hashes to all asset filenames under /assets/
    # so they can be cached indefinitely — a new file name forces cache busting.
    location /assets/ {
        add_header Cache-Control "max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Never cache index.html — it holds the <script> tags that reference
    # the hashed asset filenames, so it must always be fresh.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Lightweight health probe used by the k8s readinessProbe.
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # SPA fallback — all unmatched paths serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
