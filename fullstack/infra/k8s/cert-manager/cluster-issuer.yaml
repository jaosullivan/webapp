---
# Self-signed root CA issuer — used to bootstrap the CA certificate.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-root
spec:
  selfSigned: {}
---
# CA certificate issued by the root self-signed issuer.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: fullstack-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: fullstack-local-ca
  secretName: fullstack-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-root
    kind: ClusterIssuer
    group: cert-manager.io
---
# ClusterIssuer backed by the local CA — referenced by Ingress TLS.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: fullstack-ca-issuer
spec:
  ca:
    secretName: fullstack-ca-secret
