apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: fullstack
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: fullstack
spec:
  # Daily at 02:00 UTC
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: postgres:16-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secrets
                      key: password
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  PGHOST="postgres.fullstack.svc.cluster.local"
                  PGUSER="postgres"
                  BACKUP_DIR="/backups/$(date +%Y-%m-%d)"
                  mkdir -p "$BACKUP_DIR"

                  for DB in users orders payments; do
                    pg_dump -h "$PGHOST" -U "$PGUSER" "$DB" | gzip > "$BACKUP_DIR/${DB}.sql.gz"
                    echo "Backed up $DB"
                  done

                  # Keep last 7 days of backups
                  find /backups -maxdepth 1 -type d -mtime +7 -exec rm -rf {} +
                  echo "Backup complete: $BACKUP_DIR"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  cpu: "100m"
                  memory: "64Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup-pvc
