---
# Deny all ingress to the fullstack namespace by default.
# Subsequent policies open specific ports for specific pod selectors.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: fullstack
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Postgres: accept connections from the three backend services and the backup CronJob.
# The default-deny-ingress policy blocks all ingress unless explicitly allowed here;
# without this rule the Alembic migrate init containers cannot reach postgres:5432.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-postgres
  namespace: fullstack
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [users, orders, payments, postgres-backup]
      ports:
        - port: 5432

---
# Frontend: accept traffic only from the NGINX ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: fullstack
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 80

---
# Backend services: accept from ingress controller, and from prometheus for /metrics scraping
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-backends
  namespace: fullstack
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [users, orders, payments]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8000
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 8000

---
# Redis: accept connections only from the three backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-redis
  namespace: fullstack
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [users, orders, payments]
      ports:
        - port: 6379

---
# Prometheus: accept queries from Grafana, plus ingress for direct UI access if needed
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-prometheus
  namespace: fullstack
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: grafana
        - podSelector:
            matchLabels:
              app: alertmanager
      ports:
        - port: 9090

---
# Grafana: accept from ingress controller for browser access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-grafana
  namespace: fullstack
spec:
  podSelector:
    matchLabels:
      app: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000

---
# Loki: accept log pushes from Promtail and queries from Grafana
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-loki
  namespace: fullstack
spec:
  podSelector:
    matchLabels:
      app: loki
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: promtail
        - podSelector:
            matchLabels:
              app: grafana
      ports:
        - port: 3100

---
# Tempo: accept OTLP traces from backend services and trace queries from Grafana
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-tempo
  namespace: fullstack
spec:
  podSelector:
    matchLabels:
      app: tempo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [users, orders, payments]
      ports:
        - port: 4317  # OTLP gRPC
        - port: 4318  # OTLP HTTP
    - from:
        - podSelector:
            matchLabels:
              app: grafana
      ports:
        - port: 3200  # Tempo HTTP API

---
# Alertmanager: accept rule notifications from Prometheus
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-alertmanager
  namespace: fullstack
spec:
  podSelector:
    matchLabels:
      app: alertmanager
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 9093
