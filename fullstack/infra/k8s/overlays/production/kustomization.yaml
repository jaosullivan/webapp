apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fullstack

resources:
- ../../base/namespace.yaml
- ../../base/ingress.yaml
- ../../services/users.yaml
- ../../services/orders.yaml
- ../../services/payments.yaml
- ../../services/frontend.yaml

