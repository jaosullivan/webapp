apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fullstack-ingress
  namespace: fullstack
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /api/v1/$2
    cert-manager.io/cluster-issuer: fullstack-ca-issuer
    # Force HTTPS and add HSTS header (max-age 1 year)
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - fullstack.local
      secretName: fullstack-tls
  rules:
    - host: fullstack.local
      http:
        paths:
          - path: /api/v1/(auth|users)(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: users
                port:
                  number: 8000
          - path: /api/v1/(orders)(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: orders
                port:
                  number: 8000
          - path: /api/v1/(payments)(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: payments
                port:
                  number: 8000
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 80
