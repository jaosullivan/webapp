---
# ── Grafana admin credentials ─────────────────────────────────────────────────
# Rotate by replacing the base64-encoded values and re-applying.
# Generate: echo -n 'new-password' | base64
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-secret
  namespace: fullstack
type: Opaque
data:
  admin-user: YWRtaW4=      # admin
  admin-password: YWRtaW4=  # admin  (change before exposing publicly)

---
# ── Grafana deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: fullstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: admin-password
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost:3001"
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/prometheus.yaml
              subPath: datasources.yaml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/default.yaml
              subPath: dashboards.yaml
            - name: dashboard
              mountPath: /var/lib/grafana/dashboards/fullstack.json
              subPath: fullstack.json
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: provisioning
          configMap:
            name: grafana-provisioning
        - name: dashboard
          configMap:
            name: grafana-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: fullstack
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
