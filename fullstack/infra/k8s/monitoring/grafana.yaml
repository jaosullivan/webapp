---
# ── Grafana datasource & dashboard provider provisioning ─────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: fullstack
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus.fullstack.svc.cluster.local:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: "15s"

      - name: Loki
        type: loki
        uid: loki
        url: http://loki.fullstack.svc.cluster.local:3100
        access: proxy
        jsonData:
          maxLines: 1000

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.fullstack.svc.cluster.local:3200
        access: proxy
        jsonData:
          httpMethod: GET
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: '-5m'
            spanEndTimeShift: '5m'

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: Fullstack
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards

---
# ── Dashboard JSON ────────────────────────────────────────────────────────────
