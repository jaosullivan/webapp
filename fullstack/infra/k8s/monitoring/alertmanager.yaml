---
# Slack webhook URL — replace REPLACE_ME and re-apply.
# Generate a real webhook at https://api.slack.com/messaging/webhooks
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-slack-secret
  namespace: fullstack
type: Opaque
stringData:
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/REPLACE_ME"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: fullstack
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: default
      routes:
        - matchers:
            - severity =~ "critical|warning"
          receiver: slack

    receivers:
      - name: default

      - name: slack
        slack_configs:
          - api_url: '${SLACK_WEBHOOK_URL}'
            channel: '#alerts'
            send_resolved: true
            title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *{{ .Labels.job }}* ({{ .Labels.severity }}): {{ .Annotations.description }}
              {{ end }}

    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ['alertname', 'job']

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: fullstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--config.expand-env=true"
          ports:
            - containerPort: 9093
          envFrom:
            - secretRef:
                name: alertmanager-slack-secret
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: alertmanager-config

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: fullstack
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
