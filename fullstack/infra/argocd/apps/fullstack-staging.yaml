apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fullstack-staging
  namespace: argocd
spec:
  project: fullstack
  source:
    repoURL: https://github.com/jaosullivan/webapp
    targetRevision: develop
    path: fullstack/infra/k8s/overlays/staging
    kustomize:
      buildOptions: --load-restrictor LoadRestrictionsNone
  destination:
    server: https://kubernetes.default.svc
    namespace: fullstack-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
