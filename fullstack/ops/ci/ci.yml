name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [users, orders, payments]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ${{ matrix.service }}
        run: pip install -e ".[dev]"
        working-directory: services/${{ matrix.service }}
      - name: Test ${{ matrix.service }}
        run: pytest tests/ -v
        working-directory: services/${{ matrix.service }}

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - service: users
            context: services/users
          - service: orders
            context: services/orders
          - service: payments
            context: services/payments
          - service: frontend
            context: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }} image
        run: |
          podman build \
            -t fullstack/${{ matrix.service }}:${{ github.sha }} \
            -f ${{ matrix.context }}/Containerfile \
            ${{ matrix.context }}
