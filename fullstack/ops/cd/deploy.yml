name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Apply namespace and base resources
        run: kubectl apply -f infra/k8s/base/

      - name: Apply database resources
        run: kubectl apply -f infra/database/

      - name: Update image tags
        run: |
          for svc in users orders payments frontend; do
            kubectl set image deployment/$svc $svc=fullstack/$svc:${{ github.sha }} \
              -n fullstack
          done

      - name: Apply service manifests
        run: kubectl apply -f infra/k8s/services/

      - name: Wait for rollout
        run: |
          for svc in users orders payments frontend; do
            kubectl rollout status deployment/$svc -n fullstack --timeout=120s
          done
